<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terminal · Movers</title>
<style>
  :root {
    --bg: #0a0c10; --bg-2: #11151c; --bg-3: #1a2029; --border: #232a36;
    --fg: #e6edf3; --fg-2: #9aa5b1; --fg-3: #6b7684;
    --up: #34d399; --down: #f87171; --owned: #fbbf24; --accent: #60a5fa;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body { font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif; background: var(--bg); color: var(--fg); }
  .mono { font-family: "SF Mono", "JetBrains Mono", Consolas, monospace; font-variant-numeric: tabular-nums; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar { display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--bg-2); }
  .topbar .title { font-weight: 600; }
  .nav { display: flex; gap: 12px; }
  .nav a { color: var(--fg-2); }
  .nav a.active { color: var(--fg); border-bottom: 2px solid var(--accent); padding-bottom: 4px; }

  .filters { display: flex; gap: 8px; padding: 10px 12px; border-bottom: 1px solid var(--border); align-items: center; flex-wrap: wrap; }
  .filters label { font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; }
  .filters select, .filters button {
    background: var(--bg-2); border: 1px solid var(--border); color: var(--fg); padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  .filters .seg { display: flex; }
  .filters .seg button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  .grid {
    display: grid; gap: 1px; background: var(--border); padding: 1px;
    grid-template-columns: 1fr 1fr; grid-auto-rows: minmax(280px, auto);
  }
  .panel { background: var(--bg); padding: 10px 12px; overflow: auto; }
  .panel h2 { margin: 0 0 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-2); }
  .panel h2 .pill { background: var(--bg-3); color: var(--fg); padding: 1px 6px; border-radius: 0; font-size: 10px; margin-left: 6px; }
  .panel.winners h2 { color: var(--up); }
  .panel.losers  h2 { color: var(--down); }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th { text-align: left; font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 6px; border-bottom: 1px solid var(--border); }
  tbody td { padding: 4px 6px; border-bottom: 1px solid var(--bg-3); }
  tbody tr:hover { background: var(--bg-2); }
  td.num { font-family: "SF Mono", monospace; text-align: right; font-variant-numeric: tabular-nums; }
  td.up   { color: var(--up); }
  td.down { color: var(--down); }
  tr.owned { background: rgba(251, 191, 36, 0.06); }
  tr.owned td:first-child { border-left: 2px solid var(--owned); }

  .empty { color: var(--fg-3); padding: 12px 0; font-size: 12px; }
</style>
</head>
<body>
  <div class="topbar">
    <div class="title">📈 Movers</div>
    <div class="nav">
      <a href="/" >Terminal</a>
      <a href="/movers" class="active">Movers</a>
    </div>
  </div>

  <div class="filters">
    <label>window</label>
    <div class="seg">
      <button data-w="6">6h</button>
      <button data-w="24" class="active">24h</button>
      <button data-w="72">3d</button>
      <button data-w="168">7d</button>
    </div>
    <label style="margin-left:16px">level</label>
    <div class="seg">
      <button data-l="events" class="active">Events</button>
      <button data-l="performers">Performers</button>
      <button data-l="venues">Venues</button>
    </div>
    <label style="margin-left:16px">segment</label>
    <div class="seg">
      <button data-s="both" class="active">Both</button>
      <button data-s="owned">Owned only</button>
      <button data-s="market">Market only</button>
    </div>
    <span class="mono" style="margin-left:auto;color:var(--fg-3)" id="timestamp">—</span>
  </div>

  <div class="grid" id="grid"></div>

<script>
const STATE = { window: 24, level: "events", segment: "both", data: null };

document.querySelectorAll(".seg button").forEach(btn => {
  btn.onclick = () => {
    const seg = btn.parentElement;
    seg.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    if (btn.dataset.w) STATE.window = parseInt(btn.dataset.w);
    if (btn.dataset.l) STATE.level = btn.dataset.l;
    if (btn.dataset.s) STATE.segment = btn.dataset.s;
    if (btn.dataset.w) loadData(); else render();
  };
});

async function getJWT() {
  const cfg = await fetch("/api/public/config").then(r => r.json());
  const stored = localStorage.getItem("sb-" + new URL(cfg.supabase_url).host.split(".")[0] + "-auth-token");
  if (!stored) { window.location.href = "/?return=" + encodeURIComponent(window.location.pathname); return null; }
  try { return JSON.parse(stored).access_token; } catch (_) { return null; }
}
let JWT = null;

async function loadData() {
  if (!JWT) JWT = await getJWT();
  if (!JWT) return;
  const r = await fetch(`/api/broker/movers?window_hours=${STATE.window}`, { headers: { Authorization: "Bearer " + JWT } });
  if (r.status === 401) { window.location.href = "/"; return; }
  STATE.data = await r.json();
  document.getElementById("timestamp").textContent = `as of ${new Date().toLocaleTimeString()} · window: ${STATE.window}h`;
  render();
}

function fmtMoney(v) { if (v == null) return "—"; const n = Number(v); return isFinite(n) ? "$" + n.toLocaleString(undefined, { maximumFractionDigits: 0 }) : "—"; }
function fmtNum(v)   { if (v == null) return "—"; const n = Number(v); return isFinite(n) ? n.toLocaleString() : "—"; }
function fmtPct(v)   {
  if (v == null) return "—";
  const n = Number(v); if (!isFinite(n)) return "—";
  const cls = n > 0 ? "up" : n < 0 ? "down" : "";
  const sign = n > 0 ? "+" : "";
  return `<span class="${cls}">${sign}${n.toFixed(2)}%</span>`;
}
function fmtAbs(v)   {
  if (v == null) return "";
  const n = Number(v); if (!isFinite(n) || n === 0) return "";
  return ` <span class="mono" style="color:var(--fg-3)">(${n > 0 ? "+" : ""}${fmtMoney(Math.abs(n)).replace("$", "$")})</span>`;
}

function eventRow(r, segment) {
  const owned = (r.cur_owned_tix || 0) > 0;
  const market_pct_html = fmtPct(r.delta_market_pct);
  const owned_pct_html  = fmtPct(r.delta_owned_pct);
  return `<tr class="${owned ? 'owned' : ''}">
    <td><a href="/event/${r.event_id}">${r.name || '—'}</a><div style="color:var(--fg-3);font-size:11px">${r.venue_name || ''} · ${(r.occurs_at_local||'').slice(0,10)}</div></td>
    <td class="num">${segment !== 'market' ? fmtMoney(r.cur_owned_med) : ''}</td>
    <td class="num">${segment !== 'market' ? fmtNum(r.cur_owned_tix) : ''}</td>
    <td class="num">${segment !== 'market' ? owned_pct_html : ''}</td>
    <td class="num">${segment !== 'owned' ? fmtMoney(r.cur_market_med) : ''}</td>
    <td class="num">${segment !== 'owned' ? fmtNum(r.cur_market_tix) : ''}</td>
    <td class="num">${segment !== 'owned' ? market_pct_html : ''}</td>
  </tr>`;
}
function perfVenueRow(r, segment, idKey) {
  const has_owned = (r.owned_tix_total || 0) > 0;
  return `<tr class="${has_owned ? 'owned' : ''}">
    <td>${r.name || '—'}<div style="color:var(--fg-3);font-size:11px">${r.events_count} events</div></td>
    <td class="num">${segment !== 'market' ? fmtNum(r.owned_tix_total) : ''}</td>
    <td class="num">${segment !== 'market' ? fmtPct(r.delta_owned_pct) : ''}</td>
    <td class="num">${segment !== 'owned' ? fmtNum(r.market_tix_total) : ''}</td>
    <td class="num">${segment !== 'owned' ? fmtPct(r.delta_market_pct) : ''}</td>
  </tr>`;
}

function tableHead(segment, level) {
  if (level === "events") {
    return `<thead><tr>
      <th>Event</th>
      <th class="num">${segment !== 'market' ? 'Owned $' : ''}</th>
      <th class="num">${segment !== 'market' ? 'Owned tix' : ''}</th>
      <th class="num">${segment !== 'market' ? 'Δ owned %' : ''}</th>
      <th class="num">${segment !== 'owned' ? 'Market $' : ''}</th>
      <th class="num">${segment !== 'owned' ? 'Market tix' : ''}</th>
      <th class="num">${segment !== 'owned' ? 'Δ market %' : ''}</th>
    </tr></thead>`;
  }
  return `<thead><tr>
    <th>${level === 'performers' ? 'Performer' : 'Venue'}</th>
    <th class="num">${segment !== 'market' ? 'Owned tix' : ''}</th>
    <th class="num">${segment !== 'market' ? 'Δ owned %' : ''}</th>
    <th class="num">${segment !== 'owned' ? 'Market tix' : ''}</th>
    <th class="num">${segment !== 'owned' ? 'Δ market %' : ''}</th>
  </tr></thead>`;
}

function panel(title, kind, rows, segment, level) {
  const head = tableHead(segment, level);
  const body = rows.length
    ? rows.map(r => level === 'events' ? eventRow(r, segment) : perfVenueRow(r, segment, level === 'performers' ? 'performer_id' : 'venue_id')).join("")
    : `<tr><td colspan="7" class="empty">No data in this window.</td></tr>`;
  return `<div class="panel ${kind}">
    <h2>${title} <span class="pill">${rows.length}</span></h2>
    <table>${head}<tbody>${body}</tbody></table>
  </div>`;
}

function render() {
  const grid = document.getElementById("grid");
  if (!STATE.data) { grid.innerHTML = `<div class="panel"><div class="empty">Loading…</div></div>`; return; }
  const d = STATE.data[STATE.level] || {};
  const seg = STATE.segment;
  const panels = [];
  // Layout: owned winners/losers on top, market winners/losers below — unless segment narrows.
  if (seg === "both" || seg === "owned") {
    panels.push(panel("Owned winners",  "winners", d.owned_winners  || [], seg, STATE.level));
    panels.push(panel("Owned losers",   "losers",  d.owned_losers   || [], seg, STATE.level));
  }
  if (seg === "both" || seg === "market") {
    panels.push(panel("Market winners", "winners", d.market_winners || [], seg, STATE.level));
    panels.push(panel("Market losers",  "losers",  d.market_losers  || [], seg, STATE.level));
  }
  grid.innerHTML = panels.join("");
}

(async () => { JWT = await getJWT(); if (JWT) loadData(); })();
</script>
</body>
</html>
